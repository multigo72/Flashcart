<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F4EFE6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="FlashCart" />
<title>FlashCart — project kits, in a flash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="manifest" href='data:application/manifest+json,{"name":"FlashCart","short_name":"FlashCart","display":"standalone","background_color":"%23F4EFE6","theme_color":"%23F4EFE6","start_url":"."}' />
<style>
  :root{
    --paper:#F4EFE6;        /* warm cream surface            */
    --paper-2:#ECE4D5;      /* slightly deeper cream         */
    --card:#FFFFFF;
    --ink:#1B1815;          /* near-black warm               */
    --ink-2:#6B6357;        /* muted brown-grey              */
    --line:#E2D9C8;
    --flash:#FF4D17;        /* electric tangerine (brand)    */
    --flash-deep:#E33D0C;
    --paint:#0E6E63;        /* petrol teal  (Paint & Stain)  */
    --garden:#3C7A2E;       /* leaf green   (Lawn & Garden)  */
    --gold:#FFC53D;
    --shadow:#1B1815;
    --r:14px;
    --maxw:460px;
    --disp:'Bricolage Grotesque', Georgia, serif;
    --body:'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    --mono:'Spline Sans Mono', ui-monospace, Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  /* paper grain + faint warmth */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,77,23,.07), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
    mix-blend-mode:multiply;
  }

  /* ---------- phone shell ---------- */
  .shell{
    position:relative;z-index:1;
    max-width:var(--maxw);margin:0 auto;min-height:100dvh;
    display:flex;flex-direction:column;
    background:var(--paper);
    box-shadow:0 0 0 1px var(--line), 0 30px 70px -30px rgba(27,24,21,.35);
  }
  @media(min-width:520px){ .shell{ margin-top:18px;margin-bottom:18px;min-height:calc(100dvh - 36px);border-radius:26px;overflow:hidden} }

  /* ---------- app bar ---------- */
  .bar{
    position:sticky;top:0;z-index:20;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    background:linear-gradient(var(--paper), rgba(244,239,230,.86));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:11px;
  }
  .mark{display:flex;align-items:center;gap:9px}
  .bolt{
    width:34px;height:34px;border-radius:10px;background:var(--ink);
    display:grid;place-items:center;flex:none;
    box-shadow:3px 3px 0 var(--flash);
  }
  .bolt svg{width:18px;height:18px}
  .word{font-family:var(--disp);font-weight:800;font-size:21px;letter-spacing:-.02em;line-height:1}
  .word b{color:var(--flash)}
  .bar .tag{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-2);
    border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:var(--card)}

  /* ---------- generic ---------- */
  .screen{flex:1;padding:18px 18px 40px;animation:rise .42s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  h1.title{font-family:var(--disp);font-weight:800;letter-spacing:-.025em;line-height:1.02;margin:.25rem 0 0;font-size:clamp(28px,8vw,36px)}
  .sub{color:var(--ink-2);margin:.5rem 0 0;font-size:14.5px;line-height:1.5}

  /* ---------- zip field ---------- */
  .zip{
    margin-top:18px;display:flex;align-items:stretch;gap:0;
    background:var(--card);border:1.5px solid var(--ink);border-radius:12px;
    box-shadow:4px 4px 0 var(--ink);overflow:hidden;
  }
  .zip label{display:flex;align-items:center;gap:7px;padding:0 12px;background:var(--ink);color:var(--paper);
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .zip input{
    border:0;outline:0;background:transparent;flex:1;min-width:0;
    font-family:var(--mono);font-weight:600;font-size:19px;letter-spacing:.18em;color:var(--ink);
    padding:13px 14px;
  }
  .zip input::placeholder{color:#C9BEA8;letter-spacing:.12em}
  .zip label svg{width:14px;height:14px}

  /* ---------- tabs ---------- */
  .tabs{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:22px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:6px}
  .tab{position:relative;z-index:2;border:0;background:transparent;cursor:pointer;
    font-family:var(--disp);font-weight:700;font-size:14.5px;color:var(--ink-2);
    padding:11px 8px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:7px;
    transition:color .25s}
  .tab .dot{width:9px;height:9px;border-radius:3px;flex:none;opacity:.55;transition:opacity .25s,transform .25s}
  .tab[data-cat="paint"] .dot{background:var(--paint)}
  .tab[data-cat="garden"] .dot{background:var(--garden)}
  .tab.on{color:var(--ink)}
  .tab.on .dot{opacity:1;transform:scale(1.15)}
  .tab-ind{position:absolute;z-index:1;top:6px;bottom:6px;width:calc(50% - 6px);left:6px;
    background:var(--card);border:1.5px solid var(--ink);border-radius:9px;box-shadow:3px 3px 0 var(--ink);
    transition:transform .32s cubic-bezier(.3,.9,.25,1)}
  .tab-ind.right{transform:translateX(calc(100% + 6px))}

  /* ---------- kit cards ---------- */
  .kits{margin-top:18px;display:flex;flex-direction:column;gap:14px}
  .kit{
    --c:var(--paint);
    position:relative;text-align:left;width:100%;cursor:pointer;
    background:var(--card);border:1.5px solid var(--ink);border-radius:var(--r);
    box-shadow:5px 5px 0 var(--ink);
    padding:16px 16px 16px 18px;display:flex;align-items:center;gap:14px;
    transition:transform .12s ease, box-shadow .12s ease;
    animation:pop .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .kit::before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--c);
    border-right:1.5px solid var(--ink);border-radius:var(--r) 0 0 var(--r)}
  .kit:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink)}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
  .kit .glyph{width:50px;height:50px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:25px;
    background:color-mix(in srgb, var(--c) 14%, white);border:1.5px solid var(--c)}
  .kit .body{flex:1;min-width:0}
  .kit .name{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.015em;line-height:1.05}
  .kit .meta{margin-top:3px;color:var(--ink-2);font-size:13px}
  .kit .count{display:inline-flex;align-items:center;gap:5px;margin-top:8px;
    font-family:var(--mono);font-size:11px;color:var(--c);background:color-mix(in srgb,var(--c) 12%,white);
    border:1px solid color-mix(in srgb,var(--c) 35%,white);border-radius:999px;padding:3px 8px;white-space:nowrap}
  .kit .count svg{width:13px;height:13px;flex:none}
  .kit .chev{flex:none;color:var(--ink);opacity:.5;transition:transform .15s,opacity .15s}
  .kit:active .chev{opacity:1;transform:translateX(2px)}

  /* ---------- back link ---------- */
  .back{display:inline-flex;align-items:center;gap:7px;background:none;border:0;cursor:pointer;
    font-family:var(--mono);font-size:12px;color:var(--ink-2);padding:2px 0;margin-bottom:4px;letter-spacing:.04em}
  .back:hover{color:var(--ink)}

  /* ---------- kit detail hero ---------- */
  .khero{margin-top:10px;display:flex;align-items:center;gap:14px}
  .khero .glyph{width:58px;height:58px;font-size:29px;border-radius:14px;flex:none;display:grid;place-items:center;
    background:color-mix(in srgb,var(--c) 14%,white);border:1.5px solid var(--c);box-shadow:3px 3px 0 var(--c)}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:white;background:var(--c);border-radius:999px;padding:4px 10px}

  /* ---------- section label ---------- */
  .slabel{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
  .slabel span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  .slabel .ln{flex:1;height:1px;background:var(--line)}
  .slabel .num{font-family:var(--mono);font-size:11px;color:var(--ink-2)}

  /* ---------- item list ---------- */
  .items{list-style:none;margin:0;padding:0;border:1.5px solid var(--ink);border-radius:var(--r);overflow:hidden;background:var(--card)}
  .items li{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line)}
  .items li:last-child{border-bottom:0}
  .items .tick{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--c);flex:none;display:grid;place-items:center;
    background:color-mix(in srgb,var(--c) 10%,white);color:var(--c)}
  .items .tick svg{width:13px;height:13px}
  .items .txt{flex:1;font-size:15px;font-weight:500}
  .items .qx{font-family:var(--mono);font-size:12px;color:var(--ink-2)}

  /* ---------- store options ---------- */
  .stores{display:flex;flex-direction:column;gap:14px;margin-top:12px}
  .store{
    background:var(--card);border:1.5px solid var(--ink);border-radius:var(--r);box-shadow:5px 5px 0 var(--ink);
    padding:15px 15px 15px 16px;
  }
  .store .top{display:flex;align-items:center;gap:12px}
  .store .logo{width:44px;height:44px;border-radius:11px;flex:none;display:grid;place-items:center;
    font-family:var(--disp);font-weight:800;font-size:19px;color:white}
  .store .nm{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.1}
  .store .kind{color:var(--ink-2);font-size:12.5px;margin-top:2px}
  .store .dist{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--ink-2);line-height:1.5}
  .store .dist b{display:block;color:var(--ink);font-size:13px}
  .cta{
    margin-top:13px;width:100%;cursor:pointer;
    font-family:var(--disp);font-weight:700;font-size:15.5px;color:var(--ink);
    background:var(--flash);border:1.5px solid var(--ink);border-radius:11px;
    box-shadow:4px 4px 0 var(--ink);padding:13px;display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .1s,box-shadow .1s}
  .cta:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
  .cta svg{width:17px;height:17px}
  .ghost{background:var(--card)}

  /* ---------- cart screen ---------- */
  .receipt{margin-top:14px;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--r);
    box-shadow:5px 5px 0 var(--ink);overflow:hidden}
  .receipt .rhead{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px dashed var(--line)}
  .receipt .rhead .logo{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;color:white;
    font-family:var(--disp);font-weight:800;font-size:20px;flex:none}
  .receipt .rhead .nm{font-family:var(--disp);font-weight:700;font-size:18px}
  .receipt .rhead .nm small{display:block;font-family:var(--body);font-weight:500;color:var(--ink-2);font-size:12.5px}
  .cartline{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .cartline:last-of-type{border-bottom:1px dashed var(--line)}
  .cartline .n{font-family:var(--mono);font-size:12px;color:var(--ink-2);width:20px;flex:none}
  .cartline .nm{flex:1;font-weight:500;font-size:15px}
  .cartline a{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--c);
    text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:5px 10px;white-space:nowrap;flex:none}
  .cartline a svg{width:12px;height:12px;flex:none}
  .cartline a:active{background:var(--paper-2)}
  .rfoot{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
    font-family:var(--mono);font-size:13px}
  .rfoot b{font-family:var(--disp);font-size:16px}
  .note{display:flex;gap:10px;margin-top:16px;background:color-mix(in srgb,var(--gold) 22%, white);
    border:1.5px solid var(--ink);border-radius:12px;padding:13px 14px;font-size:13px;line-height:1.5}
  .note svg{flex:none;width:18px;height:18px;margin-top:1px}
  .note code{font-family:var(--mono);font-size:12px;background:rgba(27,24,21,.08);padding:1px 5px;border-radius:5px}

  /* cart-bot live log */
  .botlog{margin-top:12px;background:#14110d;color:#e7ddcb;border:1.5px solid var(--ink);border-radius:12px;
    box-shadow:4px 4px 0 var(--ink);padding:12px 14px;font:12px/1.65 var(--mono);max-height:240px;overflow-y:auto;
    white-space:pre-wrap;word-break:break-word}
  .botlog .bl{display:block}
  .botlog .success{color:#7fe39a}.botlog .warn{color:#f4c66a}.botlog .error{color:#ff9a8a}.botlog .info{color:#b6ab95}
  .manual{margin-top:14px;border:1px solid var(--line);border-radius:12px;background:var(--card);padding:2px 14px}
  .manual summary{cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--ink-2);padding:11px 0;list-style:none}
  .manual summary::-webkit-details-marker{display:none}
  .manual summary::before{content:"⌄ ";font-size:14px}
  .manual .hint{font-size:12.5px;color:var(--ink-2);margin:8px 0 12px}
  .runbadge{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:2px 9px;
    border-radius:999px;border:1px solid var(--line);color:var(--ink-2);background:var(--card);vertical-align:1px}
  .runbadge.running{color:var(--flash);border-color:color-mix(in srgb,var(--flash) 40%,white);background:color-mix(in srgb,var(--flash) 8%,white)}
  .runbadge.done{color:var(--garden);border-color:color-mix(in srgb,var(--garden) 40%,white);background:color-mix(in srgb,var(--garden) 8%,white)}
  .runbadge.error{color:#b91c1c;border-color:#f0c4c4;background:#fdf3f3}
  .autotag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.02em;padding:1px 6px;border-radius:999px;
    vertical-align:1px;color:var(--ink-2);background:var(--paper-2);border:1px solid var(--line)}
  .autotag.on{color:#fff;background:var(--flash);border-color:var(--flash)}
  .openbtn{margin-top:16px}

  .foot{padding:20px 18px calc(env(safe-area-inset-bottom) + 24px);color:var(--ink-2);font-size:11.5px;
    font-family:var(--mono);text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="shell">
  <header class="bar">
    <a class="mark" href="#/" style="text-decoration:none;color:inherit">
      <span class="bolt"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#FF4D17" stroke="#FF4D17" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
      <span class="word">Flash<b>Cart</b></span>
    </a>
    <span class="tag" id="barzip">98177</span>
  </header>
  <main id="app"></main>
</div>

<script>
/* ----------------------------- data ----------------------------- */
const STORES = {
  ace:     {name:'Ace Hardware',     kind:'Neighborhood hardware', logo:'A', color:'#C8102E',
            area:'Shoreline',  dist:'1.8 mi', home:'https://www.acehardware.com',
            searchTpl:'https://www.acehardware.com/search?query=%s', bot:'ace', auto:true},
  sherwin: {name:'Sherwin-Williams', kind:'Paint & stain store',   logo:'SW',color:'#0B4DA2',
            area:'N. Seattle', dist:'2.3 mi', home:'https://www.sherwin-williams.com',
            searchTpl:'https://www.sherwin-williams.com/en-us/search?q=%s', auto:false},
  sky:     {name:'Sky Nursery',      kind:'Garden center',         logo:'SN',color:'#2E7D32',
            area:'Shoreline',  dist:'0.9 mi', home:'https://skynursery.com',
            searchTpl:'https://skynursery.com/?s=%s', auto:false},
};
const searchUrl = (s,q) => s.searchTpl.replace('%s', encodeURIComponent(q));

// The cart-bot (ace-cart-bot). When this app is served BY the bot (open it at
// http://localhost:8090), it's same-origin — so default to wherever we're served
// from. Override with localStorage['fc.bot'] if the bot is elsewhere.
const BOT = localStorage.getItem('fc.bot') ||
  (location.origin && location.origin.startsWith('http') ? location.origin : 'http://localhost:8090');

const CATS = {
  paint:  {label:'Paint & Stain', color:'var(--paint)', kits:['paint-a-room','wood-staining']},
  garden: {label:'Lawn & Garden', color:'var(--garden)',kits:['lawn-fertilizing','clean-up']},
};

const KITS = {
  'paint-a-room':    {name:'Paint a Room', cat:'paint', glyph:'🎨',
    blurb:'Everything to roll a clean, even coat — wall to trim.',
    items:['Paint roller','Paint roller replacements','Paint tray',"Painter's tape",'Drop cloth','Clean-up rags'],
    stores:['sherwin','ace']},
  'wood-staining':   {name:'Wood Staining', cat:'paint', glyph:'🪵',
    blurb:'Prep, wipe, and finish bare or weathered wood.',
    items:['Wiping pads','Clean-up rags','Acetone wood cleaner'],
    stores:['sherwin','ace']},
  'lawn-fertilizing':{name:'Lawn Fertilizing', cat:'garden', glyph:'🌱',
    blurb:'Feed and water for a thick, green Northwest lawn.',
    items:['Spreader (hand-held)','Fertilizer for the Northwest','Sprinkler','50 ft garden hose'],
    stores:['sky','ace']},
  'clean-up':        {name:'Clean Up', cat:'garden', glyph:'🧤',
    blurb:'Tidy the beds and bag up the yard waste.',
    items:['Garden gloves','Small trowel / shovel','Paper yard bags'],
    stores:['sky','ace']},
};

/* ----------------------------- state ----------------------------- */
const state = {
  zip: localStorage.getItem('fc.zip') || '98177',
  tab: localStorage.getItem('fc.tab') || 'paint',
};
function setZip(z){
  state.zip = z.replace(/[^0-9]/g,'').slice(0,5);
  localStorage.setItem('fc.zip', state.zip);
  document.getElementById('barzip').textContent = state.zip || '—';
}
const e = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ----------------------------- icons ----------------------------- */
const I = {
  check:'<svg viewBox="0 0 24 24" fill="none"><path d="m5 12 4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  cart:'<svg viewBox="0 0 24 24" fill="none"><path d="M3 4h2l2.4 11.4a1.5 1.5 0 0 0 1.5 1.2h8.2a1.5 1.5 0 0 0 1.5-1.2L21 8H6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9.5" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none"><path d="M14 4h6v6M20 4l-9 9M18 13v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  chev:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M15 6 9 12l6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 16v-5M12 8h.01" stroke="#1B1815" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="#1B1815" stroke-width="1.6"/></svg>',
};

/* ----------------------------- views ----------------------------- */
function homeView(){
  const isPaint = state.tab === 'paint';
  const cat = CATS[state.tab];
  const cards = cat.kits.map((id,i)=>{
    const k = KITS[id];
    const c = k.cat==='paint' ? 'var(--paint)' : 'var(--garden)';
    return `<button class="kit" style="--c:${c};animation-delay:${i*70}ms" onclick="go('#/kit/${id}')">
      <span class="glyph" style="--c:${c}">${k.glyph}</span>
      <span class="body">
        <span class="name">${e(k.name)}</span>
        <span class="meta">${e(k.blurb)}</span>
        <span class="count" style="--c:${c}">${I.cart}&nbsp;${k.items.length} items · 2 stores</span>
      </span>
      <span class="chev">${I.chev}</span>
    </button>`;
  }).join('');

  return `<section class="screen">
    <p class="eyebrow">Project kits · Shoreline, WA</p>
    <h1 class="title">Grab a whole<br>project in a flash.</h1>
    <p class="sub">Pick a kit, set your zip, and send the full list to a nearby store's cart — no scrolling aisles.</p>

    <div class="zip">
      <label>${I.cart}&nbsp;ZIP</label>
      <input id="zip" inputmode="numeric" maxlength="5" value="${e(state.zip)}" placeholder="ZIP code"
        oninput="setZip(this.value)" aria-label="Store zip code" />
    </div>

    <div class="tabs" role="tablist">
      <div class="tab-ind ${isPaint?'':'right'}"></div>
      <button class="tab ${isPaint?'on':''}" data-cat="paint"  role="tab" onclick="setTab('paint')"><span class="dot"></span>Paint &amp; Stain</button>
      <button class="tab ${isPaint?'':'on'}" data-cat="garden" role="tab" onclick="setTab('garden')"><span class="dot"></span>Lawn &amp; Garden</button>
    </div>

    <div class="kits" id="kits">${cards}</div>

    <p class="foot">Two local stores per kit · never Home Depot or Lowe's<br>FlashCart · a shopping-list concept</p>
  </section>`;
}

function kitView(id){
  const k = KITS[id]; if(!k) return notFound();
  const c = k.cat==='paint' ? 'var(--paint)' : 'var(--garden)';
  const items = k.items.map(it=>`<li><span class="tick" style="--c:${c}">${I.check}</span><span class="txt">${e(it)}</span><span class="qx">×1</span></li>`).join('');
  const stores = k.stores.map(sid=>{
    const s = STORES[sid];
    return `<div class="store">
      <div class="top">
        <span class="logo" style="background:${s.color}">${e(s.logo)}</span>
        <div><div class="nm">${e(s.name)} ${s.auto?'<span class="autotag on">⚡ auto-build</span>':'<span class="autotag">browse only</span>'}</div><div class="kind">${e(s.kind)}</div></div>
        <div class="dist"><b>${e(s.dist)}</b>${e(s.area)}</div>
      </div>
      <button class="cta ${s.auto?'':'ghost'}" onclick="addToCart('${id}','${sid}')">${s.auto?`${I.cart} Build this cart`:`${I.ext} Open &amp; shop`}</button>
    </div>`;
  }).join('');

  return `<section class="screen" style="--c:${c}">
    <button class="back" onclick="go('#/')">${I.arrow} All kits</button>
    <span class="pill" style="--c:${c}">${e(CATS[k.cat].label)}</span>
    <div class="khero">
      <span class="glyph" style="--c:${c}">${k.glyph}</span>
      <div><h1 class="title" style="font-size:30px">${e(k.name)}</h1></div>
    </div>
    <p class="sub">${e(k.blurb)}</p>

    <div class="zip" style="margin-top:16px">
      <label>${I.cart}&nbsp;ZIP</label>
      <input inputmode="numeric" maxlength="5" value="${e(state.zip)}" placeholder="ZIP code"
        oninput="setZip(this.value);document.getElementById('near')&&(document.getElementById('near').textContent=this.value||'—')" aria-label="Store zip code" />
    </div>

    <div class="slabel"><span>In this kit</span><div class="ln"></div><span class="num">${k.items.length} items</span></div>
    <ul class="items" style="--c:${c}">${items}</ul>

    <div class="slabel"><span>Stores near <b id="near" style="color:var(--ink)">${e(state.zip)}</b></span><div class="ln"></div><span class="num">2 found</span></div>
    <div class="stores" style="--c:${c}">${stores}</div>

    <p class="foot">“Build this cart” sends the kit to the cart-bot — it opens the store and adds every item, then drops you on your cart.</p>
  </section>`;
}

function cartView(kitId, storeId){
  const k = KITS[kitId], s = STORES[storeId];
  if(!k||!s) return notFound();
  const c = k.cat==='paint' ? 'var(--paint)' : 'var(--garden)';
  const lines = k.items.map((it,i)=>`<div class="cartline">
      <span class="n">${String(i+1).padStart(2,'0')}</span>
      <span class="nm">${e(it)}</span>
      <a href="${searchUrl(s,it)}" target="_blank" rel="noopener">find ${I.ext}</a>
    </div>`).join('');

  const auto = s.auto;
  return `<section class="screen" style="--c:${c}">
    <button class="back" onclick="go('#/kit/${kitId}')">${I.arrow} Back to kit</button>
    <p class="eyebrow" style="color:var(--c)">Your cart · <span id="runbadge" class="runbadge">${auto?'ready to build':'browse only'}</span></p>
    <h1 class="title" style="font-size:28px">${e(k.name)} at ${e(s.name)}</h1>
    <p class="sub">${auto
      ? `The cart-bot opens ${e(s.name)}, finds each item, and adds it to the cart — in the background, so you can leave this page and it keeps going.`
      : `${e(s.name)} doesn't expose a searchable online catalog, so it can't be auto-built. Open the store and tap <b>find</b> on each item to add it yourself.`}</p>

    <div class="receipt" style="--c:${c}">
      <div class="rhead">
        <span class="logo" style="background:${s.color}">${e(s.logo)}</span>
        <div class="nm">${e(s.name)}<small>${e(s.kind)} · ${e(s.area)} · ${e(s.dist)} from ${e(state.zip)}</small></div>
      </div>
      ${lines}
      <div class="rfoot"><span>${k.items.length} items in kit</span><b>Ready to add</b></div>
    </div>

    ${auto
      ? `<button class="cta openbtn" id="botbtn" onclick="startRun('${kitId}','${storeId}')">${I.cart} Build this cart</button>
    <div id="botlog" class="botlog" hidden></div>`
      : `<button class="cta openbtn" onclick="window.open('${s.home}','_blank','noopener')">${I.ext} Open ${e(s.name)}</button>
    <p class="hint" style="text-align:center">Then tap <b>find</b> on any item above to search it at the store.</p>`}

    <div class="note">${I.info}<div><b>How auto-build works —</b> a web page can't write to a store's cart directly (browser security + store bot-protection), so FlashCart hands the kit to the <b>cart-bot</b>, which drives a real browser to search each item and click <b>Add&nbsp;to&nbsp;Cart</b>. It works on stores with a real online catalog (⚡ <b>Ace Hardware</b> here). To use it: run <code>cd ace-cart-bot &amp;&amp; npm start</code>, then open this app at <code>http://localhost:8090</code>. On a phone or the Vercel link the bot can't be reached.</div></div>

    <p class="foot">Wrong store? <a href="#/kit/${kitId}" style="color:var(--ink)">pick the other option →</a></p>
  </section>`;
}

function notFound(){
  return `<section class="screen"><h1 class="title">Not found</h1><p class="sub">That kit doesn't exist.</p><button class="cta" style="margin-top:16px" onclick="go('#/')">Back home</button></section>`;
}

/* ----------------------------- router + background bot runs ----------------------------- */
function go(hash){ location.hash = hash; }
function setTab(t){ state.tab = t; localStorage.setItem('fc.tab', t); render(); }

// Each cart-bot run is keyed by kit/store and owns a persistent EventSource, so
// it keeps running in the background while you move between screens (home, etc).
const runs = {};
let onRunUpdate = null;                       // the visible cart view registers this
const runKey = (k, s) => k + '/' + s;

function startRun(kitId, storeId){
  const key = runKey(kitId, storeId);
  if(runs[key] && runs[key].status === 'running'){ if(onRunUpdate) onRunUpdate(key); return runs[key]; }

  const k = KITS[kitId], s = STORES[storeId];
  const r = runs[key] = { kitId, storeId, lines:[], status:'running', es:null };
  const push = (message, level='info') => { r.lines.push({ message, level }); if(onRunUpdate) onRunUpdate(key); };

  push(`Opening ${s.name} and adding ${k.items.length} items…`);
  const params = { items: JSON.stringify(k.items), zip: state.zip, headless: 'false' };
  if (s.bot) params.site = s.bot;                              // verified built-in adapter (Ace)
  else { params.storeName = s.name; params.storeBase = s.home; params.searchTpl = s.searchTpl; }  // generic
  const qs = new URLSearchParams(params);
  let gotAny = false;
  try { r.es = new EventSource(`${BOT}/run?` + qs.toString()); }
  catch(_) { r.status = 'error'; push('Cart-bot not reachable on this device.', 'error'); return r; }

  r.es.addEventListener('progress', ev => { gotAny = true; const d = JSON.parse(ev.data); push(d.message, d.level); });
  r.es.addEventListener('done', () => {
    r.status = 'done';
    push('Cart built — your items are in the store window the bot opened.', 'success');
    if(r.es){ r.es.close(); r.es = null; }
    if(onRunUpdate) onRunUpdate(key);
  });
  r.es.onerror = () => {
    if(!gotAny){
      r.status = 'error';
      push('Couldn’t reach the cart-bot on this device.', 'error');
      push('Run it on this computer: cd ace-cart-bot && npm start — then open this app at http://localhost:8090.', 'warn');
    }
    if(r.es){ r.es.close(); r.es = null; }
    if(onRunUpdate) onRunUpdate(key);
  };
  return r;
}

// "Build this cart": kick off the background run (for auto-build stores), then
// drop onto the cart page. Browse-only stores just open the cart page.
function addToCart(kitId, storeId){
  if(STORES[storeId] && STORES[storeId].auto) startRun(kitId, storeId);
  go(`#/cart/${kitId}/${storeId}`);
}

function paintRun(key){
  const r = runs[key]; if(!r) return;
  const box = document.getElementById('botlog');
  const badge = document.getElementById('runbadge');
  const btn = document.getElementById('botbtn');
  const ICON = { info:'·', success:'✓', warn:'!', error:'✗' };
  if(box){
    box.hidden = r.lines.length === 0;
    box.innerHTML = r.lines.map(l => `<span class="bl ${l.level}">${ICON[l.level]||'·'}  ${e(l.message)}</span>`).join('');
    box.scrollTop = box.scrollHeight;
  }
  if(badge){
    badge.textContent = r.status==='running' ? 'building…' : r.status==='done' ? 'cart built ✓' : 'needs the local bot';
    badge.className = 'runbadge ' + r.status;
  }
  if(btn){
    if(r.status==='running'){ btn.setAttribute('disabled',''); btn.textContent = 'Building…'; }
    else { btn.removeAttribute('disabled'); btn.textContent = (r.status==='done' ? 'Rebuild this cart' : 'Build this cart'); }
  }
}

function render(){
  const h = location.hash.replace(/^#/,'') || '/';
  const parts = h.split('/').filter(Boolean);
  let html;
  if(parts[0]==='kit' && parts[1]) html = kitView(parts[1]);
  else if(parts[0]==='cart' && parts[1] && parts[2]) html = cartView(parts[1], parts[2]);
  else html = homeView();
  const app = document.getElementById('app');
  app.innerHTML = html;
  app.scrollTo?.(0,0); window.scrollTo(0,0);
  document.getElementById('barzip').textContent = state.zip || '—';

  // Wire the cart view to its background run (live + replayed on return).
  onRunUpdate = null;
  if(parts[0]==='cart' && parts[1] && parts[2]){
    const key = runKey(parts[1], parts[2]);
    onRunUpdate = (k) => { if(k === key) paintRun(key); };
    if(runs[key]) paintRun(key);
  }
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
